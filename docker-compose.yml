services:

  # ─────────────────────────────
  # 🌐 FRONTEND
  # ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://gateway:3000
    depends_on:
      - gateway
    networks:
      - app-network

  # ─────────────────────────────
  # 🚪 GATEWAY
  # ─────────────────────────────
  gateway:
    build:
      context: ./microservices/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "3000:3000"
    depends_on:
      - ms-auth
      - ms-vehiculos
    networks:
      - app-network

  # ─────────────────────────────
  # 🔐 MICROSERVICIOS
  # ─────────────────────────────
  ms-auth:
    build:
      context: ./microservices/services/ms-auth
      dockerfile: Dockerfile
    container_name: ms-auth
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - app-network

  ms-vehiculos:
    build:
      context: ./microservices/services/ms-vehiculos
      dockerfile: Dockerfile
    container_name: ms-vehiculos
    ports:
      - "3002:3002"
    depends_on:
      - postgres
    networks:
      - app-network

  # ─────────────────────────────
  # 🐘 DB
  # ─────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parkiupar
    ports:
      - "5432:5432"
    networks:
      - app-network

  # ─────────────────────────────
  # 📨 RABBITMQ
  # ─────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge