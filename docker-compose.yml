services:

  # ─────────────────────────────
  # ⚖️ LOAD BALANCER (NGINX)
  # ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:5173"
    depends_on:
      - ms-parqueaderos-1
      - ms-parqueaderos-2
    networks:
      - app-network

  # ─────────────────────────────
  # 🌐 FRONTEND
  # ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    networks:
      - app-network

  # ─────────────────────────────
  # 🌐 TUNNEL (acceso desde cualquier red)
  # ─────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://frontend:5173
    depends_on:
      - frontend
    networks:
      - app-network

  # ─────────────────────────────
  # 🚪 GATEWAY
  # ─────────────────────────────
  gateway:
    build:
      context: ./microservices/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MS_AUTH_URL: http://ms-auth:3001
      MS_VEHICULOS_URL: http://ms-vehiculos:3002
      MS_PARQUEADEROS_URL: http://ms-parqueaderos-1:3003
      MS_RESERVAS_URL: http://ms-reservas:3004
      MS_REPORTES_URL: http://ms-reportes:3005
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - ms-auth
      - ms-vehiculos
      - ms-parqueaderos-1
      - ms-parqueaderos-2
      - ms-reservas
      - ms-reportes
    networks:
      - app-network

  # ─────────────────────────────
  # 🔐 MICROSERVICIOS
  # ─────────────────────────────
  ms-auth:
    build:
      context: ./microservices
      dockerfile: services/ms-auth/Dockerfile
    container_name: ms-auth
    ports:
      - "3001:3001"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3001
      INSTANCE_NAME: "ms-auth"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
    networks:
      - app-network

  ms-vehiculos:
    build:
      context: ./microservices
      dockerfile: services/ms-vehiculos/Dockerfile
    container_name: ms-vehiculos
    ports:
      - "3002:3002"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3002
      INSTANCE_NAME: "ms-vehiculos"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
    networks:
      - app-network

  ms-parqueaderos-1:
    build:
      context: ./microservices
      dockerfile: services/ms-parqueaderos/Dockerfile
    container_name: ms-parqueaderos-1
    ports:
      - "30031:3003"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3003
      INSTANCE_NAME: "ms-parqueaderos-1"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
    networks:
      - app-network

  ms-parqueaderos-2:
    build:
      context: ./microservices
      dockerfile: services/ms-parqueaderos/Dockerfile
    container_name: ms-parqueaderos-2
    ports:
      - "30032:3003"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3003
      INSTANCE_NAME: "ms-parqueaderos-2"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
    networks:
      - app-network

  ms-reservas:
    build:
      context: ./microservices
      dockerfile: services/ms-reservas/Dockerfile
    container_name: ms-reservas
    ports:
      - "3004:3004"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3004
      INSTANCE_NAME: "ms-reservas"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      MS_VEHICULOS_URL: http://ms-vehiculos:3002
      MS_PARQUEADEROS_URL: http://ms-parqueaderos-1:3003
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
      - ms-vehiculos
      - ms-parqueaderos-1
      - ms-parqueaderos-2
    networks:
      - app-network

  ms-reportes:
    build:
      context: ./microservices
      dockerfile: services/ms-reportes/Dockerfile
    container_name: ms-reportes
    ports:
      - "3005:3005"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3005
      INSTANCE_NAME: "ms-reportes"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres
    networks:
      - app-network

  # ─────────────────────────────
  # 🐘 DB
  # ─────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parkiupar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
